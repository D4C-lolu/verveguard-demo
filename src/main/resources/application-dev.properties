spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Security
security.jwt.secret=${JWT_SECRET}
security.jwt.access-token-expiry=${JWT_SECRET_EXPIRATION}
security.jwt.refresh-token-expiry=${JWT_REFRESH_EXPIRATION}

# API docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Misc
spring.jmx.enabled=false

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# GeoIP
verveguard.location-anomaly.enabled=true
# Cache
spring.cache.redis.enable-statistics=true

# Virtual threads
spring.threads.virtual.enabled=true

# Tomcat connection handling
server.tomcat.max-connections=4000
server.tomcat.accept-count=500
server.tomcat.connection-timeout=20s
server.tomcat.keep-alive-timeout=15s
server.tomcat.max-keep-alive-requests=100
server.max-http-request-header-size=16KB

# ============================================================
# LOGGING
# ============================================================
logging.level.root=WARN
logging.level.com.interswitch=INFO
#logging.level.com.interswitch.verveguard-demo.aspects.ObservabilityAspect=OFF
#logging.level.com.interswitch.verveguard-demo.interceptors.LoggingInterceptor=OFF
logging.level.org.springframework=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.com.zaxxer.hikari=WARN
logging.level.com.zaxxer.hikari.HikariConfig=WARN
logging.level.org.flywaydb=INFO
logging.level.io.netty=WARN
logging.level.reactor=WARN

# ============================================================
# ACTUATOR
# ============================================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.metrics.tags.application=${spring.application.name}
management.observations.key-values.application=${spring.application.name}
management.prometheus.metrics.export.enabled=true
management.metrics.enable.http.server.requests=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
spring.cache.caffeine.spec=recordStats
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Datasource ? Hikari pool
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000

# Redis ? Lettuce pool
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-active=200
spring.data.redis.lettuce.pool.max-wait=5000ms

verveguard.observability.enabled=true